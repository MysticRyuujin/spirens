site_name: SPIRENS
site_description: Sovereign Portal for IPFS Resolution via Ethereum Naming Services
site_url: https://mysticryuujin.github.io/spirens/
repo_url: https://github.com/MysticRyuujin/spirens
repo_name: MysticRyuujin/spirens

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Architecture: 00-overview.md
      - Prerequisites: 01-prerequisites.md
      - DNS & Cloudflare: 02-dns-and-cloudflare.md
      - Certificates: 03-certificates.md
      - Deployment Profiles: 04-deployment-profiles.md
  - Services:
      - Traefik: 05-traefik.md
      - Ethereum Node: 06-ethereum-node.md
      - Helios (trustless light client): helios.md
      - eRPC: 07-erpc.md
      - IPFS (Kubo): 08-ipfs.md
      - dweb-proxy: 09-dweb-proxy.md
  - Operations:
      - Swarm deployment: swarm.md
      - Security: security.md
      - Upgrading: upgrading.md
  - CLI Reference: cli.md
  - Troubleshooting: 10-troubleshooting.md
  - Claude Code skills: skills.md

validation:
  links:
    # Docs link to repo files (../config/*, ../compose/*) that mkdocs can't
    # resolve. These links work on GitHub; suppress the warnings here.
    absolute_links: ignore
    unrecognized_links: ignore

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.mark
  - tables
  - toc:
      permalink: true
      # Use GitHub-style slugs so heading anchors match what markdownlint
      # (MD051) expects. Default python-markdown slugify collapses
      # consecutive hyphens; GitHub preserves them (e.g. "foo = bar"
      # becomes "foo--bar", not "foo-bar"). Matching GitHub avoids a
      # whole class of cross-tool anchor-link drift.
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds: { case: lower }
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MysticRyuujin/spirens
