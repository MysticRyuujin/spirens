# =============================================================================
#  eRPC — SPIRENS MVP configuration
# =============================================================================
#  Docs:     https://docs.erpc.cloud
#  Source:   https://github.com/erpc/erpc
#
#  This file is deliberately small. eRPC has many more levers — per-chain
#  finality policies, Redis caching tiers, hedging, per-budget rate limits,
#  selection scripts. Add them when you need them; upstream docs cover it
#  better than we ever could. Start here, grow from here.
#
#  Key design choices for the MVP:
#    - ONE project (`main`) exposing Ethereum mainnet
#    - eRPC's built-in `repository` provider as the default upstream: it
#      pulls a curated list of free public endpoints for 2,000+ EVM chains
#      from https://evm-public-endpoints.erpc.cloud. Good enough for dev
#      and first boot; uncomment the local-node / vendor blocks below for
#      production where you control latency and rate limits.
#    - Single in-memory cache tier; no Redis by default
#    - Retries + circuit-breaker for failover; no hedging
#    - Each vendor has its own rate-limit budget so one provider can't be
#      "punished" with global traffic when it's healthy
# =============================================================================
---
logLevel: info

server:
  httpHostV4: "0.0.0.0"
  httpPort: 8545

metrics:
  enabled: true
  hostV4: "0.0.0.0"
  port: 4001

# ─── Rate-limiter budgets (referenced from upstreams below) ─────────────────
rateLimiters:
  budgets:
    - id: default
      rules:
        - method: "*"
          maxCount: 500
          period: 1s
    - id: vendor-generous
      rules:
        - method: "*"
          maxCount: 25
          period: 1s
    - id: vendor-strict
      rules:
        - method: "*"
          maxCount: 5
          period: 1s

projects:
  - id: main

    # Failsafe policies applied as defaults to every upstream in this
    # project. eRPC ≥0.0.6x dropped the `project.failsafe` field; it now
    # lives under `upstreamDefaults.failsafe` (or `networkDefaults.failsafe`).
    # Upstreams may override individual policies by defining their own
    # `failsafe:` block — partial overrides disable the un-defined
    # policies, so set the full shape or inherit wholesale.
    upstreamDefaults:
      failsafe:
        - matchMethod: "*"
          retry:
            maxAttempts: 2
            delay: 500ms
            backoffMaxDelay: 2s
            backoffFactor: 2
          circuitBreaker:
            failureThresholdCount: 20
            failureThresholdCapacity: 100
            halfOpenAfter: 30s

    upstreams:

      # ─── PRIMARY: your own Ethereum node ────────────────────────────────
      # Automatically stripped by `spirens up` when ETH_LOCAL_URL is
      # empty — the surrounding spirens:local_node markers gate it. Set
      # ETH_LOCAL_URL in .env to activate; when set, this upstream wins
      # decisively over the repository fallback below because it's
      # declared first.
      #   host-run node:  http://host.docker.internal:8545
      #   LAN-run node:   http://192.168.1.50:8545
      # See docs/05-ethereum-node.md for how to run one.
      # spirens:local_node:begin
      - endpoint: "${ETH_LOCAL_URL}"
        evm:
          chainId: 1
        rateLimitBudget: default
      # spirens:local_node:end

      # ─── FALLBACK: public-RPC repository (2,000+ chains, no keys) ───────
      # eRPC's built-in `repository` provider aggregates free public
      # endpoints from chainlist.org / chainid.network / viem. It
      # auto-discovers chains, rotates between endpoints on failure, and
      # respects our rate-limit / retry / circuit-breaker policies from
      # upstreamDefaults.failsafe above.
      #
      # Pros: works out of the box, zero config, covers every chain ID.
      # Cons: public endpoints are best-effort — inconsistent latency,
      # unadvertised rate limits, occasional gaps. For production you
      # should run your own node (above) or a paid vendor with a SLA.
      - endpoint: repository://evm-public-endpoints.erpc.cloud
        rateLimitBudget: default

      # ─── VENDOR PROVIDERS (alternative supplements) ─────────────────────
      # Uncomment the ones you want active AND set their API key in .env.
      #
      # - endpoint: "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
      #   evm: { chainId: 1 }
      #   rateLimitBudget: vendor-generous
      #
      # - endpoint: "https://rpc.ankr.com/eth/${ANKR_API_KEY}"
      #   evm: { chainId: 1 }
      #   rateLimitBudget: vendor-generous
      #
      # - endpoint: "https://mainnet.infura.io/v3/${INFURA_API_KEY}"
      #   evm: { chainId: 1 }
      #   rateLimitBudget: vendor-strict

      # ─── ADDING MORE CHAINS ────────────────────────────────────────────
      # Copy the upstream block above and change chainId. Common IDs:
      #   Base:        8453    (endpoint: https://base-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY})
      #   Arbitrum:    42161   (endpoint: https://arb-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY})
      #   Optimism:    10
      #   Polygon:     137
      # Then query via e.g. POST https://rpc.example.com/main/evm/8453
      #
      # Request routing: the path after the project id selects the chain —
      # /main/evm/1 or /main/evm?chainId=1 work; eRPC infers from the chainId.

# ─── Optional: Redis cache ──────────────────────────────────────────────────
# Disabled by default. To enable, uncomment AND include
# compose/single-host/optional/compose.redis.yml.
#
# database:
#   evmJsonRpcCache:
#     connectors:
#       - id: memory
#         driver: memory
#         memory: { maxItems: 50000 }
#       - id: redis
#         driver: redis
#         redis:
#           uri: "redis://:${REDIS_PASSWORD}@redis:6379/0"
