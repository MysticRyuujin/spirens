# =============================================================================
#  SPIRENS — DNS record manifest
# =============================================================================
#  This file is the source of truth for every DNS record the stack needs.
#  It's consumed by:
#    - docs/02-dns-and-cloudflare.md  (rendered as a table for readers)
#    - compose/*/optional/compose.dns-sync.yml  (reconciled against Cloudflare)
#
#  Each entry:
#    type       : A | AAAA | CNAME | TXT      (SPIRENS only ships A by default)
#    name       : subdomain relative to BASE_DOMAIN (use "@" for the apex)
#    proxied    : true  → Cloudflare orange-cloud (proxied)
#                 false → grey-cloud (DNS-only)
#    visibility : public   → only needed as a public A record if serving external
#                            clients; internal deployments use local DNS instead
#                 internal → only accessed by the operator or by other services;
#                            almost never needs a public A record
#    comment    : free-form — shows up in the docs table and as a CF comment
#
#  PUBLIC_IP for A records is supplied at sync time from the environment
#  (PUBLIC_IP=auto auto-detects via ipv4.icanhazip.com).
#
#  Regardless of visibility, ALL records need valid TLS certificates.
#  Traefik obtains those via ACME DNS-01 challenges (TXT records), which
#  only requires API access to the DNS provider — no public A records needed.
# =============================================================================
---
records:
  # Non-wildcards are proxied by default — CF gives you DDoS protection,
  # CDN caching of idempotent JSON-RPC / CID responses, and hides your
  # origin IP for free. eRPC is pure HTTP(S) JSON-RPC (no WebSockets),
  # so CF's WebSocket idle-timeout isn't a concern for us.
  - { type: A, name: rpc,          proxied: true,  visibility: public,   comment: "eRPC JSON-RPC endpoint (proxied; eRPC is HTTP-only)" }
  - { type: A, name: ipfs,         proxied: true,  visibility: public,   comment: "IPFS HTTP gateway root (proxied for CID caching; ≤100MB on CF Free)" }
  - { type: A, name: eth,          proxied: true,  visibility: public,   comment: "ENS gateway root (proxied)" }
  - { type: A, name: ens-resolver, proxied: true,  visibility: internal, comment: "DoH endpoint Kubo uses for .eth resolution (proxied)" }
  - { type: A, name: traefik,      proxied: true,  visibility: internal, comment: "Traefik dashboard (IP-allowlisted + basic-auth; proxied)" }

  # Wildcards MUST be DNS-only on Cloudflare Free/Pro — proxying wildcards
  # requires Business ($200/mo) or higher. They'd happily be proxied if
  # the plan allowed.
  - { type: A, name: "*.ipfs",     proxied: false, visibility: public,   comment: "IPFS subdomain gateway — content by CID ({cid}.ipfs.$BASE)" }
  - { type: A, name: "*.ipns",     proxied: false, visibility: public,   comment: "IPFS subdomain gateway — mutable names ({key}.ipns.$BASE)" }
  - { type: A, name: "*.eth",      proxied: false, visibility: public,   comment: "ENS subdomain gateway (wildcard; CF Free/Pro can't proxy wildcards)" }
