# =============================================================================
#  SPIRENS — pre-commit
# =============================================================================
#  With direnv: hooks install automatically on first `cd` into the repo.
#  Without direnv:
#     uv tool install pre-commit  (or: pipx / brew install pre-commit)
#     pre-commit install
#
#  Run on all files: pre-commit run --all-files
#  CI runs the same set via .github/workflows/lint.yml.
# =============================================================================
---
default_install_hook_types: [pre-commit, commit-msg]

repos:
  # ─── Basic hygiene ─────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^mkdocs\.yml$  # uses !!python/name: tag that requires unsafe load
      - id: check-json
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=500]

  # ─── YAML lint (Traefik/Compose/config) ────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]

  # ─── Markdown lint ─────────────────────────────────────────────────────────
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        args: [--config, .markdownlint.json]

  # ─── Prettier (JSON, MD, YAML where safe) ──────────────────────────────────
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        types_or: [json, markdown]
        # YAML intentionally omitted — prettier's YAML formatter rewrites
        # comments we rely on for the educational docs.

  # ─── Ruff (Python lint + format — replaces black + isort + flake8) ────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ─── Mypy (static type checking) ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - typer>=0.24
          - pydantic>=2.13
          - httpx>=0.28
          - python-dotenv>=1.2
          - pyyaml>=6.0.3
          - types-PyYAML
        pass_filenames: false
        entry: mypy src/spirens/
